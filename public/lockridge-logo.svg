<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="LockRidge Security">
  <rect width="200" height="200" fill="#f6f6f6"/>
  <!-- Shackle -->
  <path d="M72 78 V56 a28 28 0 0 1 56 0 V78" fill="none" stroke="#EB6017" stroke-width="11" stroke-linecap="round"/>
  <!-- Lock body -->
  <rect x="52" y="78" width="96" height="78" rx="8" fill="#EB6017"/>
  <!-- "LR" cutout, suggested -->
  <path d="M68 96 V140 H82" fill="none" stroke="#f6f6f6" stroke-width="7" stroke-linecap="square"/>
  <path d="M96 96 V140 M96 96 H114 a10 10 0 0 1 0 20 H96 M111 116 L122 140" fill="none" stroke="#f6f6f6" stroke-width="7" stroke-linecap="square" stroke-linejoin="round"/>
  <!-- Keyhole -->
  <circle cx="132" cy="108" r="5" fill="#f6f6f6"/>
  <rect x="130.5" y="112" width="3" height="10" fill="#f6f6f6"/>
  <!-- Key -->
  <g transform="translate(160 90)">
    <circle cx="6" cy="6" r="10" fill="none" stroke="#EB6017" stroke-width="4"/>
    <rect x="4" y="14" width="4" height="34" fill="#EB6017"/>
    <rect x="8" y="34" width="9" height="4" fill="#EB6017"/>
    <rect x="8" y="42" width="6" height="4" fill="#EB6017"/>
  </g>
  <!-- Wordmark -->
  <text x="100" y="180" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" text-anchor="middle" fill="#111">LOCKRIDGE</text>
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="10" letter-spacing="4" text-anchor="middle" fill="#EB6017">SECURITY</text>
</svg>
